name: restaurants-api-cd

on:  
  push:
    branches:
    - main  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          # Optional SDK version(s) to use. If not provided, will install global.json version when available. Examples: 2.2.104, 3.1, 3.1.x, 3.x, 6.0.2xx, latest
          dotnet-version: 8.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Publish
        run: dotnet publish ./src/Restaurants.API/Restaurants.API.csproj -o ${{env.DOTNET_ROOT}}/api --no-build
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: api-artifact
          path: ${{env.DOTNET_ROOT}}/api          


  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    steps:
       - name: Download a Build Artifact
         uses: actions/download-artifact@v7.0.0
         with:
           name: api-artifact
       - name: Azure WebApp
         uses: Azure/webapps-deploy@v3.0.8
         with:
          app-name: 'restaurants-api-dev'
          publish-profile: ${{ secrets.PUBLISH_PROFILE_DEV }}
